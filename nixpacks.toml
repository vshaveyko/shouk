providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "openssl"]

# Nixpacks auto-runs `npm ci` in its install phase for Node projects and
# executes the `postinstall` script (which runs `prisma generate`). No need
# to repeat either here — doing so triggers EBUSY on node_modules/.cache.
[phases.build]
cmds = [
  "npx prisma migrate deploy",
  "npm run build",
]

[start]
cmd = "npm run start"
